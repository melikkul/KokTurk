# v5 conservative: ISOLATES the loss improvement.
# Focal loss only. No augmentation. No noise weighting.
model: single_seq2seq
curriculum: fixed
loss:
  type: focal
  gamma: 2.0
  label_smoothing: 0.0
data:
  augment: false
  domains: [news]
train:
  base_lr: 5e-4
  max_epochs: 30
  batch_size: 256
