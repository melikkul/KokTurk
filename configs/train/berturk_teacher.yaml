# BERTurk teacher model configuration
model:
  name: "dbmdz/bert-base-turkish-cased"
  num_labels: 60  # number of canonical tags
  freeze_layers: 8  # freeze first 8 of 12 layers

training:
  epochs: 10
  batch_size: 32
  learning_rate: 0.00002
  weight_decay: 0.01
  warmup_ratio: 0.1
  fp16: true
  gradient_checkpointing: true
