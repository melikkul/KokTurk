# Knowledge distillation: full atomizer → Conv1D student
teacher:
  checkpoint: "${hydra:runtime.cwd}/models/atomizer_v1/best.pt"

student:
  type: "conv1d"
  num_layers: 3
  channels: 128
  kernel_size: 3

distillation:
  temperature: 4.0
  alpha_kl: 0.5
  beta_mse: 0.3
  gamma_ce: 0.2
  epochs: 15
  batch_size: 256
  learning_rate: 0.001
