# Full benchmark evaluation configuration
intrinsic:
  metrics: ["exact_match", "morpheme_f1", "root_accuracy", "suffix_sequence_accuracy"]
  test_path: "${hydra:runtime.cwd}/data/splits/test.jsonl"

extrinsic:
  dataset: "ttc3600"
  cv_folds: 5
  metrics: ["macro_f1", "per_class_f1", "accuracy"]

efficiency:
  metrics: ["param_count", "model_size_mb", "tokens_per_sec_cpu", "tokens_per_sec_gpu", "memory_rss"]
  batch_sizes: [1, 8, 32, 128]

statistical:
  bootstrap_samples: 10000
  confidence_level: 0.95
  significance_threshold: 0.01
  correction: "holm_bonferroni"
  effect_size: "cohens_d"
